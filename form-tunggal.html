<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pesanan Kustom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .form-input { transition: all 0.3s ease-in-out; }
        .form-input:focus { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); border-color: #3B82F6; }
        .notification { transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out; }
        .hidden-section { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out; opacity: 0; }
        .visible-section { max-height: 500px; opacity: 1; }
        .hidden { display: none; }
        select:disabled {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-blue-50">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-3xl">
        
        <div class="mb-6">
            <a href="index.html" class="text-blue-600 hover:text-blue-800">&larr; Kembali ke Pilihan Pesanan</a>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-800">Formulir Pesanan Kustom</h1>
            <p class="text-gray-600 mt-2">Silakan isi detail pesanan Anda di bawah ini.</p>
        </div>

        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg">
            <form id="order-form">
                
                <!-- Bagian Data Pemesan -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">1. Data Pemesan</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="customer-name" class="block text-sm font-medium text-gray-700 mb-1">Nama Pemesan</label>
                            <input type="text" id="customer-name" name="nama-pemesan" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Contoh: Budi Santoso" required>
                        </div>
                        <div>
                            <label for="customer-phone" class="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon</label>
                            <input type="tel" id="customer-phone" name="nomor-telepon" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Contoh: 081234567890" required>
                        </div>
                    </div>
                </div>

                <!-- Bagian Spesifikasi Pesanan -->
                <div class="mt-8">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">2. Spesifikasi Pesanan</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Kolom Kiri -->
                        <div class="space-y-6">
                            <div>
                                <label for="order-title" class="block text-sm font-medium text-gray-700 mb-1">Judul Pesanan</label>
                                <input type="text" id="order-title" name="judul-pesanan" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Contoh: Buku Panduan Karyawan" required>
                            </div>
                            <div>
                                <label for="book-size" class="block text-sm font-medium text-gray-700 mb-1">Ukuran Jadi</label>
                                <input type="text" id="book-size" name="ukuran-jadi" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Contoh: 17,6 x 25 cm" required>
                            </div>
                            <div>
                                <label for="paper-type-select" class="block text-sm font-medium text-gray-700 mb-1">Jenis Kertas Isi</label>
                                <select id="paper-type-select" name="jenis-kertas-isi-select" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                                    <option value="">-- Pilih dari daftar --</option>
                                    <option value="Bookpaper 57">Bookpaper 57</option>
                                    <option value="Bookpaper 72">Bookpaper 72</option>
                                    <option value="HVS 70">HVS 70</option>
                                    <option value="HVS 80">HVS 80</option>
                                    <option value="Lainnya">Lainnya (Isi Manual)...</option>
                                </select>
                                <input type="text" id="paper-type-other" name="jenis-kertas-isi" class="form-input w-full p-3 border border-gray-300 rounded-lg mt-2 hidden" placeholder="Ketik jenis kertas isi lainnya">
                            </div>
                             <div>
                                <label for="cover-paper-select" class="block text-sm font-medium text-gray-700 mb-1">Jenis Kertas Sampul</label>
                                <select id="cover-paper-select" name="jenis-kertas-sampul-select" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                                    <option value="">-- Pilih dari daftar --</option>
                                    <option value="Ivory 190 GR">Ivory 190 GR</option>
                                    <option value="Ivory 210 GR">Ivory 210 GR</option>
                                    <option value="Ivory 230 GR">Ivory 230 GR</option>
                                    <option value="Ivory 260 GR">Ivory 260 GR</option>
                                    <option value="Ivory 310 GR">Ivory 310 GR</option>
                                    <option value="BC 150">BC 150</option>
                                    <option value="BC 200">BC 200</option>
                                    <option value="Lainnya">Lainnya (Isi Manual)...</option>
                                </select>
                                <input type="text" id="cover-paper-other" name="jenis-kertas-sampul" class="form-input w-full p-3 border border-gray-300 rounded-lg mt-2 hidden" placeholder="Ketik jenis kertas sampul lainnya">
                            </div>
                        </div>
                        <!-- Kolom Kanan -->
                        <div class="space-y-6">
                            <div>
                                <label for="cover-finishing" class="block text-sm font-medium text-gray-700 mb-1">Finishing Sampul</label>
                                <select id="cover-finishing" name="finishing-sampul" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                                    <option>Tanpa Laminasi</option>
                                    <option>Laminasi Doff</option>
                                    <option>Laminasi Glossy</option>
                                    <option>Spot UV</option>
                                    <option>Emboss</option>
                                    <option>Lainnya</option>
                                </select>
                            </div>
                            <div>
                                <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">Jumlah Cetak</label>
                                <input type="number" id="quantity" name="jumlah-cetak" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Contoh: 70" required>
                            </div>
                             <div>
                                <label for="book-type" class="block text-sm font-medium text-gray-700 mb-1">Jenis Buku</label>
                                <select id="book-type" name="jenis-buku" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                                    <option value="Soft Cover">Soft Cover</option>
                                    <option value="Hard Cover">Hard Cover</option>
                                </select>
                            </div>
                            <div>
                                <label for="binding" class="block text-sm font-medium text-gray-700 mb-1">Jilid</label>
                                 <select id="binding" name="jilid" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                                    <option>Binding</option>
                                    <option>Staples</option>
                                    <option>Jahit</option>
                                    <option>Lainnya</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bagian Cetak Warna Dinamis -->
                <div class="mt-8">
                     <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">3. Detail Cetak Isi</h3>
                    <div>
                        <label for="print-type" class="block text-sm font-medium text-gray-700 mb-1">Jenis Cetak Isi</label>
                        <select id="print-type" name="jenis-cetak-isi" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                            <option value="Semua Hitam Putih">Semua Hitam Putih</option>
                            <option value="Semua Full Warna">Semua Full Warna</option>
                            <option value="Campuran">Campuran (Warna & H/P)</option>
                        </select>
                    </div>
                    
                    <div id="page-details" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Input Halaman BW -->
                        <div id="bw-section">
                            <label for="bw-pages" class="block text-sm font-medium text-gray-700 mb-1">Halaman BW</label>
                            <input type="number" id="bw-pages" name="halaman-bw" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Contoh: 60" required>
                        </div>
                        <!-- Input Halaman Warna -->
                        <div id="color-section" class="hidden">
                            <label for="color-pages" class="block text-sm font-medium text-gray-700 mb-1">Halaman Warna</label>
                            <input type="number" id="color-pages" name="halaman-warna" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Contoh: 16">
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                     <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">4. Catatan Tambahan</h3>
                    <textarea id="notes" name="catatan-tambahan" rows="4" class="form-input w-full p-3 border border-gray-300 rounded-lg" placeholder="Jelaskan detail lain jika ada..."></textarea>
                </div>
                <div class="mt-8 text-center">
                    <button type="submit" id="submit-button" class="w-full md:w-auto bg-blue-600 text-white font-bold py-3 px-10 rounded-lg hover:bg-blue-700">Kirim Pesanan</button>
                </div>
            </form>
        </div>
        <div id="notification" class="notification fixed top-5 right-5 py-3 px-6 rounded-lg shadow-xl opacity-0 transform translate-y-[-20px]"></div>
    </div>

    <script>
        const bookTypeSelect = document.getElementById('book-type');
        const bindingSelect = document.getElementById('binding');
        const printTypeSelect = document.getElementById('print-type');
        const bwSection = document.getElementById('bw-section');
        const colorSection = document.getElementById('color-section');
        const bwPagesInput = document.getElementById('bw-pages');
        const colorPagesInput = document.getElementById('color-pages');

        // Logika untuk Jenis Buku -> Jilid
        bookTypeSelect.addEventListener('change', function() {
            if (this.value === 'Hard Cover') {
                bindingSelect.value = 'Jahit';
                bindingSelect.disabled = true;
            } else {
                bindingSelect.disabled = false;
            }
        });

        // Logika untuk Jenis Cetak Isi -> Tampilan Halaman
        printTypeSelect.addEventListener('change', function() {
            const isBwOnly = this.value === 'Semua Hitam Putih';
            const isColorOnly = this.value === 'Semua Full Warna';
            const isMixed = this.value === 'Campuran';

            bwSection.classList.toggle('hidden', isColorOnly);
            colorSection.classList.toggle('hidden', isBwOnly);

            bwPagesInput.required = isBwOnly || isMixed;
            colorPagesInput.required = isColorOnly || isMixed;
        });

        // Logika untuk dropdown jenis kertas
        function setupPaperSelect(selectId, otherInputId) {
            const selectElement = document.getElementById(selectId);
            const otherInputElement = document.getElementById(otherInputId);
            selectElement.addEventListener('change', function() {
                const isOther = this.value === 'Lainnya';
                otherInputElement.classList.toggle('hidden', !isOther);
                otherInputElement.required = isOther;
                selectElement.required = !isOther;
            });
        }
        setupPaperSelect('paper-type-select', 'paper-type-other');
        setupPaperSelect('cover-paper-select', 'cover-paper-other');

        // Logika untuk Submit Form
        const form = document.getElementById('order-form');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxhZ7_NdUWt5X6uLTdWoeHlf9POBaVhEzb3dCTp0aBFrGuQ5g_rImvx46CvQeLyMfmF/exec';
        const submitButton = document.getElementById('submit-button');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitButton.disabled = true;
            submitButton.textContent = 'Mengirim...';

            const formData = new FormData(form);
            const printType = formData.get('jenis-cetak-isi');

            // Menyesuaikan data halaman sebelum dikirim
            if (printType === 'Semua Hitam Putih') {
                formData.set('halaman-warna', '0');
            } else if (printType === 'Semua Full Warna') {
                formData.set('halaman-bw', formData.get('halaman-warna'));
            }

            // Menggabungkan nilai dari select atau input manual
            const paperTypeSelect = document.getElementById('paper-type-select');
            if (paperTypeSelect.value !== 'Lainnya') {
                formData.set('jenis-kertas-isi', paperTypeSelect.value);
            }
            const coverPaperSelect = document.getElementById('cover-paper-select');
            if (coverPaperSelect.value !== 'Lainnya') {
                formData.set('jenis-kertas-sampul', coverPaperSelect.value);
            }
            formData.delete('jenis-kertas-isi-select');
            formData.delete('jenis-kertas-sampul-select');

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    showNotification('Pesanan berhasil dikirim!', 'success');
                    form.reset();
                    // Reset semua tampilan dinamis
                    bwSection.classList.remove('hidden');
                    colorSection.classList.add('hidden');
                    bindingSelect.disabled = false;
                    document.getElementById('paper-type-other').classList.add('hidden');
                    document.getElementById('cover-paper-other').classList.add('hidden');
                })
                .catch(error => {
                    showNotification('Gagal mengirim pesanan. Coba lagi.', 'error');
                })
                .finally(() => {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Kirim Pesanan';
                });
        });
        
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification fixed top-5 right-5 text-white py-3 px-6 rounded-lg shadow-xl opacity-0 transform translate-y-[-20px] ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            setTimeout(() => { notification.style.opacity = '1'; notification.style.transform = 'translateY(0)'; }, 100);
            setTimeout(() => { notification.style.opacity = '0'; notification.style.transform = 'translateY(-20px)'; }, 4000);
        }
    </script>
</body>
</html>
