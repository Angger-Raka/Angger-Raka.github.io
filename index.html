<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Mobile Developer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Styles for smooth animations */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
        }

        /* Fade In Animation classes */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Delay utilities for staggered animations */
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-primary-500 selection:text-white flex flex-col min-h-screen">

    <!-- Data Source -->
    <script src="data.js"></script>

    <!-- Navbar -->
    <nav class="fixed w-full bg-white/90 backdrop-blur-md z-50 border-b border-gray-100 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="#" id="nav-logo" class="text-2xl font-bold text-primary-600 tracking-tight"></a>
                </div>

                <!-- Desktop Menu -->
                <div id="nav-desktop-links" class="hidden md:flex space-x-8 items-center">
                    <!-- Links injected via JS -->
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-600 hover:text-primary-600 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Panel (Hidden by default) -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-gray-100 shadow-lg absolute w-full">
            <div id="nav-mobile-links" class="px-4 pt-2 pb-6 space-y-2 flex flex-col">
                <!-- Links injected via JS -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">

        <!-- Hero Section -->
        <section id="home" class="pt-32 pb-20 lg:pt-48 lg:pb-32 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto flex flex-col-reverse lg:flex-row items-center gap-12">
            <div class="lg:w-1/2 flex flex-col items-center lg:items-start text-center lg:text-left space-y-6 fade-in">
                <div id="hero-greeting" class="inline-block px-4 py-1.5 rounded-full bg-primary-50 text-primary-600 font-medium text-sm mb-2 border border-primary-100">
                    <!-- Injected via JS -->
                </div>
                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-gray-900 leading-tight">
                    <span id="hero-name"></span> <br/>
                    <span id="hero-role" class="text-primary-600"></span>
                </h1>
                <p id="hero-desc" class="text-lg text-gray-600 max-w-2xl leading-relaxed">
                    <!-- Injected via JS -->
                </p>
                <div class="flex flex-col sm:flex-row gap-4 pt-4 w-full sm:w-auto">
                    <a id="hero-btn-primary" href="#" class="bg-primary-600 text-white px-8 py-3.5 rounded-full font-semibold hover:bg-primary-700 transition-all shadow-lg shadow-primary-500/30 text-center flex justify-center items-center gap-2">
                        <!-- Injected via JS -->
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </a>
                    <a id="hero-btn-secondary" href="#" class="bg-white text-gray-700 border-2 border-gray-200 px-8 py-3.5 rounded-full font-semibold hover:border-primary-600 hover:text-primary-600 transition-all text-center">
                        <!-- Injected via JS -->
                    </a>
                </div>
            </div>
            <div class="lg:w-1/2 relative flex justify-center fade-in delay-200">
                <!-- Decorative background elements -->
                <div class="absolute inset-0 bg-primary-100 rounded-full blur-3xl opacity-30 transform scale-110 translate-y-10"></div>
                <!-- Profile Image Placeholder -->
                <div class="relative w-64 h-64 sm:w-80 sm:h-80 lg:w-96 lg:h-96 rounded-full overflow-hidden border-8 border-white shadow-2xl z-10 bg-gray-100 flex items-center justify-center">
                    <svg class="w-1/2 h-1/2 text-gray-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <!-- Floating tech badges -->
                <div class="absolute top-10 left-0 bg-white p-3 rounded-2xl shadow-lg animate-bounce z-20 hidden md:block" style="animation-duration: 3s;">
                    <img id="hero-icon-1" src="" class="w-10 h-10" alt="Tech Icon 1" />
                </div>
                <div class="absolute bottom-10 right-0 bg-white p-3 rounded-2xl shadow-lg animate-bounce z-20 hidden md:block" style="animation-duration: 4s; animation-delay: 1s;">
                    <img id="hero-icon-2" src="" class="w-10 h-10" alt="Tech Icon 2" />
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="py-20 bg-white border-t border-gray-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-16 fade-in">
                    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
                        <span id="about-title"></span> <span id="about-title-highlight" class="text-primary-600"></span>
                    </h2>
                    <div class="w-20 h-1.5 bg-primary-600 mx-auto rounded-full"></div>
                </div>
                <div class="flex flex-col md:flex-row gap-12 items-center">
                    <div class="md:w-5/12 fade-in delay-100">
                        <div class="bg-primary-50 rounded-3xl p-8 border border-primary-100 relative">
                            <div class="absolute -top-4 -left-4 w-20 h-20 bg-primary-100 rounded-full blur-xl opacity-50 z-0"></div>
                            <h3 id="about-card-title" class="text-2xl font-bold text-gray-900 mb-4 relative z-10"></h3>
                            <div id="about-paragraphs" class="relative z-10">
                                <!-- Paragraphs injected via JS -->
                            </div>
                        </div>
                    </div>
                    <div id="about-stats" class="md:w-7/12 grid grid-cols-2 gap-6 fade-in delay-200">
                        <!-- Stats injected via JS -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Skills Section -->
        <section id="skills" class="py-20 bg-gray-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-16 fade-in">
                    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
                        <span id="skills-title"></span> <span id="skills-title-highlight" class="text-primary-600"></span>
                    </h2>
                    <div class="w-20 h-1.5 bg-primary-600 mx-auto rounded-full"></div>
                    <p id="skills-subtitle" class="mt-6 text-gray-600 max-w-2xl mx-auto text-lg"></p>
                </div>

                <div id="skills-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 lg:gap-8 fade-in delay-100">
                    <!-- Skills injected via JS -->
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="py-20 bg-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-16 fade-in">
                    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
                        <span id="projects-title"></span> <span id="projects-title-highlight" class="text-primary-600"></span>
                    </h2>
                    <div class="w-20 h-1.5 bg-primary-600 mx-auto rounded-full"></div>
                    <p id="projects-subtitle" class="mt-6 text-gray-600 max-w-2xl mx-auto text-lg"></p>
                </div>

                <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in delay-100">
                    <!-- Projects injected via JS -->
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="py-20 bg-primary-600 relative overflow-hidden">
            <!-- Background Patterns -->
            <div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-white opacity-10"></div>
            <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-white opacity-5"></div>

            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center fade-in">
                <h2 id="contact-title" class="text-3xl md:text-4xl font-bold text-white mb-6"></h2>
                <p id="contact-subtitle" class="text-primary-100 text-lg mb-10 max-w-2xl mx-auto"></p>

                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <a id="contact-email" href="#" class="bg-white text-primary-600 px-8 py-4 rounded-full font-bold hover:bg-gray-50 transition-colors shadow-lg flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        <span id="contact-email-text"></span>
                    </a>
                    <a id="contact-linkedin" href="#" target="_blank" class="bg-transparent text-white border-2 border-white/30 px-8 py-4 rounded-full font-bold hover:bg-white/10 hover:border-white transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        <span id="contact-linkedin-text"></span>
                    </a>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 py-8 border-t border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div id="footer-logo" class="text-2xl font-bold text-white tracking-tight"></div>
            <p class="text-gray-400 text-sm text-center md:text-left">
                &copy; <span id="year"></span> <span id="footer-text"></span>
            </p>
            <div id="footer-socials" class="flex space-x-4">
                <!-- Social links injected via JS -->
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script>
        // ==========================================
        // Inject Data from data.js
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof portfolioData === 'undefined') {
                console.error("Data portfolioData tidak ditemukan! Pastikan file data.js diload dengan benar.");
                return;
            }

            // Navbar
            document.getElementById('nav-logo').textContent = portfolioData.navbar.logo;
            const desktopLinksContainer = document.getElementById('nav-desktop-links');
            const mobileLinksContainer = document.getElementById('nav-mobile-links');

            portfolioData.navbar.links.forEach(link => {
                // Desktop link
                const dLink = document.createElement('a');
                dLink.href = link.href;
                dLink.className = "text-gray-600 hover:text-primary-600 font-medium transition-colors";
                dLink.textContent = link.title;
                desktopLinksContainer.appendChild(dLink);

                // Mobile link
                const mLink = document.createElement('a');
                mLink.href = link.href;
                mLink.className = "block px-3 py-2 text-base font-medium text-gray-700 hover:text-primary-600 hover:bg-primary-50 rounded-md";
                mLink.textContent = link.title;
                mobileLinksContainer.appendChild(mLink);
            });

            // Navbar CTA
            const ctaDesktop = document.createElement('a');
            ctaDesktop.href = portfolioData.navbar.cta.href;
            ctaDesktop.className = "bg-primary-600 text-white px-5 py-2 rounded-full font-medium hover:bg-primary-700 transition-colors shadow-md shadow-primary-500/30";
            ctaDesktop.textContent = portfolioData.navbar.cta.title;
            desktopLinksContainer.appendChild(ctaDesktop);

            const ctaMobile = document.createElement('a');
            ctaMobile.href = portfolioData.navbar.cta.href;
            ctaMobile.className = "block px-3 py-2 text-base font-medium text-primary-600 hover:bg-primary-50 rounded-md mt-4 border border-primary-100 text-center";
            ctaMobile.textContent = portfolioData.navbar.cta.title;
            mobileLinksContainer.appendChild(ctaMobile);

            // Hero
            document.getElementById('hero-greeting').textContent = portfolioData.hero.greeting;
            document.getElementById('hero-name').textContent = portfolioData.hero.name;
            document.getElementById('hero-role').textContent = portfolioData.hero.role;
            document.getElementById('hero-desc').textContent = portfolioData.hero.description;

            const btnPrimary = document.getElementById('hero-btn-primary');
            btnPrimary.href = portfolioData.hero.primaryButton.href;
            btnPrimary.childNodes[0].nodeValue = portfolioData.hero.primaryButton.text + " ";

            const btnSecondary = document.getElementById('hero-btn-secondary');
            btnSecondary.href = portfolioData.hero.secondaryButton.href;
            btnSecondary.textContent = portfolioData.hero.secondaryButton.text;

            if(portfolioData.hero.techIcons.length >= 2) {
                document.getElementById('hero-icon-1').src = portfolioData.hero.techIcons[0];
                document.getElementById('hero-icon-2').src = portfolioData.hero.techIcons[1];
            }

            // About
            document.getElementById('about-title').textContent = portfolioData.about.title;
            document.getElementById('about-title-highlight').textContent = portfolioData.about.titleHighlight;
            document.getElementById('about-card-title').textContent = portfolioData.about.cardTitle;

            const aboutParagraphsContainer = document.getElementById('about-paragraphs');
            portfolioData.about.paragraphs.forEach(text => {
                const p = document.createElement('p');
                p.className = "text-gray-600 leading-relaxed mb-4";
                p.innerHTML = text.replace(/\*(.*?)\*/g, '<em>$1</em>'); // Simple markdown for italic
                aboutParagraphsContainer.appendChild(p);
            });

            const statsContainer = document.getElementById('about-stats');
            portfolioData.about.stats.forEach(stat => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center hover:shadow-md transition-shadow";
                div.innerHTML = `
                    <span class="text-4xl font-bold text-primary-600 mb-2">${stat.number}</span>
                    <span class="text-gray-600 font-medium">${stat.text}</span>
                `;
                statsContainer.appendChild(div);
            });

            // Skills
            document.getElementById('skills-title').textContent = portfolioData.skills.title;
            document.getElementById('skills-title-highlight').textContent = portfolioData.skills.titleHighlight;
            document.getElementById('skills-subtitle').textContent = portfolioData.skills.subtitle;

            const skillsGrid = document.getElementById('skills-grid');
            portfolioData.skills.items.forEach(skill => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-2xl p-6 text-center shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 border border-gray-100 group";
                div.innerHTML = `
                    <div class="w-16 h-16 mx-auto ${skill.bgColor} rounded-xl flex items-center justify-center mb-4 ${skill.hoverBgColor} transition-colors">
                        ${skill.icon}
                    </div>
                    <h4 class="font-semibold text-gray-900">${skill.name}</h4>
                    <p class="text-sm text-gray-500 mt-1">${skill.level}</p>
                `;
                skillsGrid.appendChild(div);
            });

            // Projects
            document.getElementById('projects-title').textContent = portfolioData.projects.title;
            document.getElementById('projects-title-highlight').textContent = portfolioData.projects.titleHighlight;
            document.getElementById('projects-subtitle').textContent = portfolioData.projects.subtitle;

            const projectsGrid = document.getElementById('projects-grid');
            portfolioData.projects.items.forEach(project => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-xl transition-all duration-300 group";

                let tagsHtml = project.tags.map(tag =>
                    `<span class="px-3 py-1 ${tag.colorClass} text-xs font-semibold rounded-full">${tag.name}</span>`
                ).join('');

                div.innerHTML = `
                    <div class="h-60 bg-gray-100 relative overflow-hidden flex items-center justify-center">
                        <div class="absolute inset-0 bg-gradient-to-br ${project.themeColors.gradientFrom} ${project.themeColors.gradientTo} opacity-50"></div>
                        ${project.icon}
                        <div class="absolute inset-0 ${project.themeColors.hoverOverlay} opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-sm z-20">
                            <a href="${project.link}" class="px-6 py-2 bg-white ${project.themeColors.textColor} rounded-full font-semibold transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">Detail Projek</a>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${tagsHtml}
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-2">${project.title}</h3>
                        <p class="text-gray-600 text-sm line-clamp-3">${project.description}</p>
                    </div>
                `;
                projectsGrid.appendChild(div);
            });

            // Contact
            document.getElementById('contact-title').textContent = portfolioData.contact.title;
            document.getElementById('contact-subtitle').textContent = portfolioData.contact.subtitle;

            const contactEmail = document.getElementById('contact-email');
            contactEmail.href = `mailto:${portfolioData.contact.email.address}`;
            document.getElementById('contact-email-text').textContent = portfolioData.contact.email.text;

            const contactLinkedin = document.getElementById('contact-linkedin');
            contactLinkedin.href = portfolioData.contact.linkedin.url;
            document.getElementById('contact-linkedin-text').textContent = portfolioData.contact.linkedin.text;

            // Footer
            document.getElementById('footer-logo').textContent = portfolioData.navbar.logo; // Reuse logo
            document.getElementById('footer-text').textContent = portfolioData.footer.text;

            const footerSocials = document.getElementById('footer-socials');
            portfolioData.footer.socials.forEach(social => {
                const a = document.createElement('a');
                a.href = social.url;
                a.className = "text-gray-400 hover:text-white transition-colors";
                a.innerHTML = social.icon;
                footerSocials.appendChild(a);
            });

            // Re-initialize intersection observer for dynamically added fade-in elements (if any new ones were added with fade-in class inside JS)
            // But since our wrappers already have fade-in, we just need to make sure the observer runs after DOM is painted.
            initObserver();

            // Close mobile menu when a link is clicked (Now done after injection)
            const mobileLinks = document.getElementById('mobile-menu').querySelectorAll('a');
            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    document.getElementById('mobile-menu').classList.add('hidden');
                });
            });

            // Set current year in footer
            document.getElementById('year').textContent = new Date().getFullYear();
        });

        // Mobile menu toggle
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');

        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });

        // Navbar scroll effect
        const navbar = document.querySelector('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                navbar.classList.add('shadow-md');
                navbar.classList.remove('shadow-sm', 'border-b', 'border-gray-100');
            } else {
                navbar.classList.remove('shadow-md');
                navbar.classList.add('shadow-sm', 'border-b', 'border-gray-100');
            }
        });

        // Intersection Observer for Fade-In Animation
        function initObserver() {
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => {
                observer.observe(el);
            });
        }
    </script>
</body>
</html>
