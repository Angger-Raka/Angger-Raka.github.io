<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Order Percetakan</title>
    <!-- Memuat Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memuat Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Menggunakan font Inter sebagai default */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Style tambahan untuk transisi dan fokus */
        .form-input {
            transition: all 0.3s ease-in-out;
        }
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            border-color: #3B82F6;
        }
        /* Style untuk pesan notifikasi */
        .notification {
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-blue-50">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-3xl">
        
        <!-- Header Form -->
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-800">Formulir Order Percetakan</h1>
            <p class="text-gray-600 mt-2">Silakan isi detail pesanan Anda di bawah ini.</p>
        </div>

        <!-- Form Container -->
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg">
            <form id="order-form">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Kolom Kiri -->
                    <div class="space-y-6">
                        <div>
                            <label for="customer-name" class="block text-sm font-medium text-gray-700 mb-1">Nama Pemesan</label>
                            <input type="text" id="customer-name" name="nama-pemesan" placeholder="Contoh: Budi Santoso" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label for="customer-phone" class="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon</label>
                            <input type="tel" id="customer-phone" name="nomor-telepon" placeholder="Contoh: 081234567890" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label for="order-title" class="block text-sm font-medium text-gray-700 mb-1">Judul Pesanan</label>
                            <input type="text" id="order-title" name="judul-pesanan" placeholder="Contoh: Buku Panduan Karyawan" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label for="book-size" class="block text-sm font-medium text-gray-700 mb-1">Ukuran Jadi</label>
                            <input type="text" id="book-size" name="ukuran-jadi" placeholder="Contoh: 17,6 x 25 cm" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                         <div>
                            <label for="page-count" class="block text-sm font-medium text-gray-700 mb-1">Jumlah Halaman</label>
                            <input type="number" id="page-count" name="jumlah-halaman" placeholder="Contoh: 60" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label for="paper-type" class="block text-sm font-medium text-gray-700 mb-1">Jenis Kertas Isi</label>
                            <input type="text" id="paper-type" name="jenis-kertas-isi" placeholder="Contoh: HVS 70 gr" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                    </div>

                    <!-- Kolom Kanan -->
                    <div class="space-y-6">
                        <div>
                            <label for="cover-paper" class="block text-sm font-medium text-gray-700 mb-1">Jenis Kertas Sampul</label>
                            <input type="text" id="cover-paper" name="jenis-kertas-sampul" placeholder="Contoh: Art Carton 260 gr" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label for="cover-finishing" class="block text-sm font-medium text-gray-700 mb-1">Finishing Sampul</label>
                            <select id="cover-finishing" name="finishing-sampul" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                                <option>Tanpa Laminasi</option>
                                <option>Laminasi Doff</option>
                                <option>Laminasi Glossy</option>
                                <option>Spot UV</option>
                                <option>Emboss</option>
                                <option>Lainnya (jelaskan di catatan)</option>
                            </select>
                        </div>
                        <div>
                            <label for="binding" class="block text-sm font-medium text-gray-700 mb-1">Jilid</label>
                             <select id="binding" name="jilid" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                                <option>Binding</option>
                                <option>Staples</option>
                                <option>Lainnya (jelaskan di catatan)</option>
                            </select>
                        </div>
                        <div>
                            <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">Jumlah Cetak</label>
                            <input type="number" id="quantity" name="jumlah-cetak" placeholder="Contoh: 70" class="form-input w-full p-3 border border-gray-300 rounded-lg" required>
                        </div>
                    </div>
                </div>

                <!-- Catatan Tambahan -->
                <div class="mt-6">
                    <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Catatan Tambahan</label>
                    <textarea id="notes" name="catatan-tambahan" rows="4" placeholder="Jelaskan detail lain jika ada, misal: warna cetak, permintaan khusus, dll." class="form-input w-full p-3 border border-gray-300 rounded-lg"></textarea>
                </div>

                <!-- Tombol Submit -->
                <div class="mt-8 text-center">
                    <button type="submit" id="submit-button" class="w-full md:w-auto bg-blue-600 text-white font-bold py-3 px-10 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition-transform transform hover:scale-105">
                        Kirim Pesanan
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Pesan Notifikasi (Tersembunyi) -->
        <div id="notification" class="notification fixed top-5 right-5 py-3 px-6 rounded-lg shadow-xl opacity-0 transform translate-y-[-20px]">
            <!-- Pesan akan diisi oleh JavaScript -->
        </div>
    </div>

    <script>
        const form = document.getElementById('order-form');
        const submitButton = document.getElementById('submit-button');
        const notification = document.getElementById('notification');
        
        // ====================================================================================
        // GANTI URL DI BAWAH INI DENGAN URL HASIL DEPLOYMENT APPS SCRIPT ANDA
        // ====================================================================================
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxL6_9a1yVuUHe7uasxv8mKu8-7_goNbEPrITQDK2CR6aB0L5lwTT_p1mIBoUxN3wWn/exec';
        // ====================================================================================

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah form dikirim secara default
            
            // Nonaktifkan tombol dan tampilkan status loading
            submitButton.disabled = true;
            submitButton.textContent = 'Mengirim...';

            // --- PERUBAHAN UNTUK FORMAT NOMOR HP ---
            const phoneInput = document.getElementById('customer-phone');
            let originalPhoneValue = phoneInput.value; // Simpan nilai asli
            if (phoneInput.value.startsWith('0')) {
                phoneInput.value = '62' + phoneInput.value.substring(1);
            }
            // --- AKHIR PERUBAHAN ---

            const formData = new FormData(form);

            // Kirim data ke Google Apps Script menggunakan fetch
            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    console.log('Success!', data);
                    showNotification('Pesanan berhasil dikirim!', 'success');
                    form.reset(); // Kosongkan form
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    showNotification('Gagal mengirim pesanan. Coba lagi.', 'error');
                    phoneInput.value = originalPhoneValue; // Kembalikan nilai asli jika gagal
                })
                .finally(() => {
                    // Aktifkan kembali tombol setelah selesai
                    submitButton.disabled = false;
                    submitButton.textContent = 'Kirim Pesanan';
                });
        });

        function showNotification(message, type) {
            notification.textContent = message;
            if (type === 'success') {
                notification.className = 'notification fixed top-5 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-xl opacity-0 transform translate-y-[-20px]';
            } else {
                notification.className = 'notification fixed top-5 right-5 bg-red-500 text-white py-3 px-6 rounded-lg shadow-xl opacity-0 transform translate-y-[-20px]';
            }

            // Tampilkan notifikasi
            setTimeout(() => {
                notification.style.opacity = '1';
                notification.style.transform = 'translateY(0)';
            }, 100);

            // Sembunyikan notifikasi setelah 4 detik
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateY(-20px)';
            }, 4000);
        }
    </script>

</body>
</html>
